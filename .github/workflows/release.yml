name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Release assets stay intentionally narrow so we only publish targets we can support.
          - goos: darwin
            goarch: arm64
            asset_name: macos-arm64
          - goos: linux
            goarch: arm64
            asset_name: linux-arm64
          - goos: linux
            goarch: amd64
            asset_name: linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -euo pipefail

          archive_root="dist/ctx_${ASSET_NAME}"
          archive_name="ctx_${GITHUB_REF_NAME}_${ASSET_NAME}.tar.gz"

          mkdir -p "${archive_root}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${archive_root}/ctx" .
          tar -C dist -czf "dist/${archive_name}" "ctx_${ASSET_NAME}"

      - name: Upload archive
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download archives
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum dist/*.tar.gz > dist/ctx_${GITHUB_REF_NAME}_checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/ctx_${{ github.ref_name }}_checksums.txt
